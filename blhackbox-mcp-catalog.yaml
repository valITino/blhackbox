# blhackbox MCP Server Catalog for Docker MCP Gateway
# Used by docker/mcp-gateway when --catalog flag is set.
#
# The gateway aggregates these MCP servers behind a single Streamable HTTP
# endpoint at http://localhost:8080/mcp for host-based clients (Claude Desktop,
# ChatGPT).
#
# This catalog is ONLY used when the gateway profile is enabled:
#   docker compose --profile gateway up -d
#
# Docs: https://github.com/docker/mcp-gateway/blob/main/docs/catalog.md

name: blhackbox
displayName: blhackbox Pentesting Framework

registry:
  kali-mcp:
    description: "Kali Linux security tools + Metasploit Framework — 70+ tools: nmap, nikto, gobuster, sqlmap, hydra, msfconsole, msfvenom, etc."
    title: "Kali MCP Server"
    type: "server"
    remote:
      url: "http://kali-mcp:9001/mcp"
      transport_type: streamable

  wire-mcp:
    description: "Wireshark/tshark — 7 tools: packet capture, pcap analysis, credential extraction, stream following"
    title: "WireMCP Server"
    type: "server"
    remote:
      # wire-mcp shares kali-mcp's network namespace for traffic visibility
      url: "http://kali-mcp:9003/mcp"
      transport_type: streamable

  screenshot-mcp:
    description: "Headless Chromium screenshots — 4 tools: take_screenshot, take_element_screenshot, list_screenshots, annotate_screenshot"
    title: "Screenshot MCP Server"
    type: "server"
    remote:
      url: "http://screenshot-mcp:9004/mcp"
      transport_type: streamable

  hexstrike-bridge-mcp:
    description: "HexStrike Gamma MCP — upstream tool surface connected to the local HexStrike API container"
    title: "HexStrike MCP Server"
    type: "server"
    remote:
      url: "http://hexstrike-bridge-mcp:9006/mcp"
      transport_type: streamable

  boaz-mcp:
    description: "BOAZ MCP — upstream BOAZ-MCP Gamma server exposed over Streamable HTTP"
    title: "BOAZ MCP Server"
    type: "server"
    remote:
      url: "http://boaz-mcp:9005/mcp"
      transport_type: streamable
