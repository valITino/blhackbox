# blhackbox v2.0 -- Modular Docker Infrastructure
#
# Usage:
#   docker compose pull                          Pull all pre-built images
#   docker compose up -d                         Start core stack (10 containers)
#   docker compose --profile gateway up -d       Start with MCP Gateway (11 containers)
#   docker compose --profile claude-code up -d   Start with Claude Code container
#   docker compose --profile neo4j up -d         Start with Neo4j
#   docker compose build                         Build all custom images locally
#
# MCP servers:
#   kali-mcp         (FastMCP SSE, port 9001) — Kali Linux security tools (50+)
#   metasploit-mcp   (FastMCP SSE, port 9002) — Metasploit Framework (13+ tools)
#   wire-mcp         (FastMCP SSE, port 9003) — Wireshark/tshark (7 tools)
#   screenshot-mcp   (FastMCP SSE, port 9004) — Headless Chromium screenshots (4 tools)
#   ollama-mcp       (FastMCP SSE, port 9000) — Ollama preprocessing pipeline
#   hexstrike        (Flask REST API, port 8888) — HexStrike AI tools (NOT MCP protocol)
#
# NOTE on HexStrike: It runs a Flask REST API, NOT an MCP SSE server.
# Its 150+ tools are accessible via HTTP at http://hexstrike:8888/api/...
# from any container on blhackbox_net. Native MCP support is a future goal.
#
# Claude Code (Docker) connects directly to MCP servers via SSE.
# Claude Desktop / ChatGPT connect via the MCP Gateway (--profile gateway).
#
# Claude Desktop config (requires --profile gateway):
#   {"mcpServers": {"blhackbox": {"transport": "streamable-http", "url": "http://localhost:8080/mcp"}}}

networks:
  blhackbox_net:
    driver: bridge
    name: blhackbox_net

volumes:
  neo4j_data:
  neo4j_logs:
  ollama_models:
  portainer_data:
  results:
  wordlists:

services:

  # -- MCP GATEWAY (OPTIONAL) ------------------------------------------------
  # Single entry point for HOST-based MCP clients (Claude Desktop, ChatGPT).
  # NOT needed for Claude Code in Docker — it connects directly to each server.
  # Enable with: docker compose --profile gateway up -d
  #
  # The gateway uses a catalog file to discover MCP servers by name.
  # It requires Docker socket access. It proxies tool calls from
  # localhost:8080/mcp to the correct MCP server container.
  # Docs: https://github.com/docker/mcp-gateway
  #
  # NOTE: Only kali-mcp and ollama-mcp are MCP servers. HexStrike is a
  # Flask REST API and is NOT included in the gateway.
  mcp-gateway:
    image: docker/mcp-gateway:latest
    container_name: blhackbox-mcp-gateway
    profiles: ["gateway"]
    restart: unless-stopped
    ports:
      - "${MCP_GATEWAY_PORT:-8080}:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./blhackbox-mcp-catalog.yaml:/catalog.yaml:ro
    environment:
      HOME: /root
      # Bypass Docker Desktop feature checks on headless Linux.
      DOCKER_MCP_IN_CONTAINER: "1"
    command:
      - --transport=streaming
      - --port=8080
      - --catalog=/catalog.yaml
      - --servers=kali-mcp,metasploit-mcp,wire-mcp,screenshot-mcp,hexstrike-mcp,ollama-mcp
      - --log-calls
    networks:
      - blhackbox_net
    depends_on:
      kali-mcp:
        condition: service_healthy
      metasploit-mcp:
        condition: service_healthy
      wire-mcp:
        condition: service_healthy
      screenshot-mcp:
        condition: service_healthy
      ollama-mcp:
        condition: service_healthy

  # -- KALI MCP SERVER -------------------------------------------------------
  # Host-based clients can connect directly via SSE at http://localhost:9001/sse
  # without the MCP Gateway. Claude Code (Docker) uses the internal URL
  # http://kali-mcp:9001/sse instead.
  kali-mcp:
    image: crhacky/blhackbox:kali-mcp
    build:
      context: .
      dockerfile: docker/kali-mcp.Dockerfile
    container_name: blhackbox-kali-mcp
    restart: unless-stopped
    privileged: true
    init: true
    environment:
      # WPScan API token for vulnerability database lookups (Issue #15)
      WPSCAN_API_TOKEN: "${WPSCAN_API_TOKEN:-}"
      # Max timeout for long-running scans (Issue #8)
      KALI_MAX_TIMEOUT: "${KALI_MAX_TIMEOUT:-600}"
    ports:
      - "${KALI_MCP_PORT:-9001}:9001"
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:9001/sse')\""]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 10s
    networks:
      blhackbox_net:
        # wire-mcp shares this container's network namespace, so add an alias
        # so other containers can also resolve "wire-mcp" to this IP.
        aliases:
          - wire-mcp

  # -- METASPLOIT MCP SERVER -------------------------------------------------
  # Wraps the Metasploit Framework via msfrpcd (MSF RPC).
  # Provides 13+ MCP tools for exploit lifecycle management.
  # Inspired by GH05TCREW/MetasploitMCP and LYFTIUM-INC/msfconsole-mcp.
  metasploit-mcp:
    image: crhacky/blhackbox:metasploit-mcp
    build:
      context: .
      dockerfile: docker/metasploit-mcp.Dockerfile
    container_name: blhackbox-metasploit-mcp
    restart: unless-stopped
    privileged: true
    init: true
    environment:
      MSFRPC_USER: "${MSFRPC_USER:-msf}"
      MSFRPC_PASS: "${MSFRPC_PASS:-msf}"
      MSFRPC_PORT: "55553"
      MSFRPC_HOST: "127.0.0.1"
      MSFRPC_SSL: "true"
    healthcheck:
      # Check both the MCP SSE endpoint (port 9002) AND msfrpcd (port 55553).
      # The MCP server starts quickly, but tools are non-functional without
      # msfrpcd. Checking both ensures the container only reports healthy
      # when Metasploit tools are actually usable.
      # msfrpcd typically needs 30-90s after container start (PostgreSQL init
      # + msfdb init + msfrpcd startup), hence the 120s start_period.
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:9002/sse')\" && ss -tlnp | grep -q ':55553'"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 120s
    networks:
      - blhackbox_net

  # -- WIREMCP SERVER -------------------------------------------------------
  # Wireshark/tshark MCP server for packet capture and network analysis.
  # Provides 7 MCP tools: capture_packets, read_pcap, get_conversations,
  # get_statistics, extract_credentials, follow_stream, list_interfaces.
  # Inspired by 0xKoda/WireMCP and khuynh22/mcp-wireshark.
  #
  # NOTE: Uses network_mode: "service:kali-mcp" to share the Kali container's
  # network namespace. This allows tshark to capture traffic from Kali tool
  # execution. Without this, tshark sees 0 packets due to Docker network
  # isolation between containers.  Port 9003 is accessible via the kali-mcp
  # container's IP (or kali-mcp:9003 from other containers on blhackbox_net).
  wire-mcp:
    image: crhacky/blhackbox:wire-mcp
    build:
      context: .
      dockerfile: docker/wire-mcp.Dockerfile
    container_name: blhackbox-wire-mcp
    restart: unless-stopped
    privileged: true
    init: true
    network_mode: "service:kali-mcp"
    depends_on:
      kali-mcp:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:9003/sse')\""]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 10s

  # -- SCREENSHOT MCP SERVER -------------------------------------------------
  # Headless Chromium screenshot server for bug bounty PoC evidence capture.
  # Provides 4 MCP tools: take_screenshot, take_element_screenshot,
  # list_screenshots, annotate_screenshot.
  # Uses Playwright + Chromium for reliable headless web page capture.
  screenshot-mcp:
    image: crhacky/blhackbox:screenshot-mcp
    build:
      context: .
      dockerfile: docker/screenshot-mcp.Dockerfile
    container_name: blhackbox-screenshot-mcp
    restart: unless-stopped
    init: true
    shm_size: '2gb'
    cap_add:
      - SYS_ADMIN
    environment:
      SCREENSHOTS_DIR: "/tmp/screenshots"
      NAVIGATION_TIMEOUT: "30000"
      MAX_CONCURRENT_SCREENSHOTS: "3"
      SCREENSHOT_MCP_PORT: "${SCREENSHOT_MCP_PORT:-9004}"
    ports:
      - "${SCREENSHOT_MCP_PORT:-9004}:9004"
    volumes:
      - results:/tmp/screenshots
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:9004/health')\""]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 15s
    networks:
      - blhackbox_net

  # -- HEXSTRIKE AI (REST API) -----------------------------------------------
  # Flask REST API on port 8888 — NOT an MCP server.
  # Provides 150+ security tool wrappers and 12+ AI agents via HTTP.
  # Source: https://github.com/0x4m4/hexstrike-ai (also a Kali Linux package)
  hexstrike:
    image: crhacky/blhackbox:hexstrike
    build:
      context: .
      dockerfile: docker/hexstrike.Dockerfile
    container_name: blhackbox-hexstrike
    restart: unless-stopped
    init: true
    ports:
      - "8888:8888"
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8888/health')\""]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - blhackbox_net

  # -- HEXSTRIKE MCP ADAPTER -------------------------------------------------
  # Bridges the HexStrike Flask REST API to MCP protocol.
  # Allows Claude Code to discover and invoke HexStrike tools natively.
  # Transport: FastMCP SSE on port 9005.
  hexstrike-mcp:
    image: crhacky/blhackbox:hexstrike-mcp
    build:
      context: .
      dockerfile: docker/hexstrike-mcp.Dockerfile
      network: host
    container_name: blhackbox-hexstrike-mcp
    restart: unless-stopped
    init: true
    environment:
      HEXSTRIKE_URL: "http://hexstrike:8888"
      MCP_PORT: "9005"
    ports:
      - "9005:9005"
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:9005/sse')\""]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 10s
    depends_on:
      hexstrike:
        condition: service_healthy
    networks:
      - blhackbox_net

  # -- OLLAMA MCP SERVER (CUSTOM) --------------------------------------------
  # blhackbox custom component. NOT an official Ollama product.
  # Thin MCP orchestrator -- calls the 3 agent containers in sequence
  # via HTTP, assembles the AggregatedPayload, and returns it to Claude.
  # Does NOT call Ollama directly.
  ollama-mcp:
    image: crhacky/blhackbox:ollama-mcp
    build:
      context: .
      dockerfile: docker/ollama-mcp.Dockerfile
    container_name: blhackbox-ollama-mcp
    restart: unless-stopped
    init: true
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:9000/sse')\""]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 10s
    environment:
      OLLAMA_HOST: "http://ollama:11434"
      OLLAMA_MODEL: "${OLLAMA_MODEL:-llama3.1:8b}"
      AGENT_INGESTION_URL: "http://agent-ingestion:8001"
      AGENT_PROCESSING_URL: "http://agent-processing:8002"
      AGENT_SYNTHESIS_URL: "http://agent-synthesis:8003"
      AGENT_TIMEOUT: "${AGENT_TIMEOUT:-360}"
      AGENT_RETRIES: "${AGENT_RETRIES:-2}"
      NEO4J_URI: "${NEO4J_URI:-bolt://neo4j:7687}"
      NEO4J_USER: "${NEO4J_USER:-neo4j}"
      NEO4J_PASSWORD: "${NEO4J_PASSWORD:-}"
    depends_on:
      agent-ingestion:
        condition: service_healthy
      agent-processing:
        condition: service_healthy
      agent-synthesis:
        condition: service_healthy
    networks:
      - blhackbox_net

  # -- AGENT 1: INGESTION ---------------------------------------------------
  # Parses and structures raw Kali + HexStrike tool output.
  # Calls Ollama /api/chat with ingestion system prompt.
  agent-ingestion:
    image: crhacky/blhackbox:agent-ingestion
    build:
      context: .
      dockerfile: docker/agent-ingestion.Dockerfile
    container_name: blhackbox-agent-ingestion
    restart: unless-stopped
    environment:
      OLLAMA_HOST: "http://ollama:11434"
      OLLAMA_MODEL: "${OLLAMA_MODEL:-llama3.1:8b}"
      OLLAMA_TIMEOUT: "${OLLAMA_TIMEOUT:-300}"
      OLLAMA_NUM_CTX: "${OLLAMA_NUM_CTX:-8192}"
      OLLAMA_KEEP_ALIVE: "${OLLAMA_KEEP_ALIVE:-30m}"
      OLLAMA_RETRIES: "${OLLAMA_RETRIES:-2}"
    depends_on:
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health')\""]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - blhackbox_net

  # -- AGENT 2: PROCESSING --------------------------------------------------
  # Deduplicates, extracts errors, compresses data into efficient blobs.
  # Annotates error_log entries with security_relevance.
  agent-processing:
    image: crhacky/blhackbox:agent-processing
    build:
      context: .
      dockerfile: docker/agent-processing.Dockerfile
    container_name: blhackbox-agent-processing
    restart: unless-stopped
    environment:
      OLLAMA_HOST: "http://ollama:11434"
      OLLAMA_MODEL: "${OLLAMA_MODEL:-llama3.1:8b}"
      OLLAMA_TIMEOUT: "${OLLAMA_TIMEOUT:-300}"
      OLLAMA_NUM_CTX: "${OLLAMA_NUM_CTX:-8192}"
      OLLAMA_KEEP_ALIVE: "${OLLAMA_KEEP_ALIVE:-30m}"
      OLLAMA_RETRIES: "${OLLAMA_RETRIES:-2}"
    depends_on:
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8002/health')\""]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - blhackbox_net

  # -- AGENT 3: SYNTHESIS ----------------------------------------------------
  # Merges Agent 1 + Agent 2 output into final AggregatedPayload.
  # Adds metadata, resolves conflicts, sends back to Claude.
  agent-synthesis:
    image: crhacky/blhackbox:agent-synthesis
    build:
      context: .
      dockerfile: docker/agent-synthesis.Dockerfile
    container_name: blhackbox-agent-synthesis
    restart: unless-stopped
    environment:
      OLLAMA_HOST: "http://ollama:11434"
      OLLAMA_MODEL: "${OLLAMA_MODEL:-llama3.1:8b}"
      OLLAMA_TIMEOUT: "${OLLAMA_TIMEOUT:-300}"
      OLLAMA_NUM_CTX: "${OLLAMA_NUM_CTX:-8192}"
      OLLAMA_KEEP_ALIVE: "${OLLAMA_KEEP_ALIVE:-30m}"
      OLLAMA_RETRIES: "${OLLAMA_RETRIES:-2}"
    depends_on:
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8003/health')\""]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - blhackbox_net

  # -- OLLAMA ----------------------------------------------------------------
  # Custom entrypoint that auto-pulls and warms up the configured model on
  # startup, eliminating cold-start delays (~17 min → seconds on subsequent
  # requests).  All 3 agent containers call this via /api/chat independently.
  ollama:
    image: crhacky/blhackbox:ollama
    build:
      context: .
      dockerfile: docker/ollama.Dockerfile
    container_name: blhackbox-ollama
    restart: unless-stopped
    environment:
      OLLAMA_MODEL: "${OLLAMA_MODEL:-llama3.1:8b}"
      # Keep models loaded in memory between sequential agent calls.
      # The 3-stage pipeline (ingestion → processing → synthesis) runs
      # sequentially, and reloading the model between calls adds minutes
      # of latency on CPU-only systems.  30m ensures the model stays
      # resident for the entire pipeline.
      OLLAMA_KEEP_ALIVE: "${OLLAMA_KEEP_ALIVE:-30m}"
      # Allow parallel inference requests from multiple agent containers.
      # While the current pipeline is sequential, this enables future
      # parallelism and prevents request queueing during health checks.
      OLLAMA_NUM_PARALLEL: "${OLLAMA_NUM_PARALLEL:-3}"
    volumes:
      - ollama_models:/root/.ollama
    healthcheck:
      # Verify the server is up AND the model is actually loaded
      test: ["CMD-SHELL", "ollama list | grep -q \"${OLLAMA_MODEL:-llama3.1:8b}\" || ollama list"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 120s
    networks:
      - blhackbox_net
    # GPU support -- disabled by default for broad compatibility.
    # If you have an NVIDIA GPU, uncomment the 'deploy' block below
    # to enable GPU acceleration for Ollama. This can reduce pipeline
    # processing time from ~17 minutes (CPU) to under 2 minutes (GPU).
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  # -- NEO4J (OPTIONAL) ------------------------------------------------------
  # Enable with: docker compose --profile neo4j up -d
  # Provides cross-session persistence and relationship querying.
  # Not needed for single-engagement use.
  neo4j:
    image: neo4j:5
    container_name: blhackbox-neo4j
    profiles: ["neo4j"]
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: "neo4j/${NEO4J_PASSWORD}"
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_memory_heap_initial__size: "512m"
      NEO4J_dbms_memory_heap_max__size: "1G"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - blhackbox_net

  # -- CLAUDE CODE (OPTIONAL) ------------------------------------------------
  # MCP client running inside Docker -- no host install needed.
  # Enable with: docker compose --profile claude-code up -d
  # Then run:    docker compose run --rm claude-code
  #
  # Connects DIRECTLY to each MCP server via SSE over the Docker network.
  # Does NOT require the MCP Gateway.
  claude-code:
    image: crhacky/blhackbox:claude-code
    build:
      context: .
      dockerfile: docker/claude-code.Dockerfile
    container_name: blhackbox-claude-code
    profiles: ["claude-code"]
    stdin_open: true
    tty: true
    environment:
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
      # Bypass egress proxies (e.g. GitHub Codespaces) for internal Docker traffic
      no_proxy: "mcp-gateway,kali-mcp,metasploit-mcp,wire-mcp,screenshot-mcp,hexstrike,hexstrike-mcp,ollama-mcp,ollama,agent-ingestion,agent-processing,agent-synthesis,localhost,127.0.0.1"
      NO_PROXY: "mcp-gateway,kali-mcp,metasploit-mcp,wire-mcp,screenshot-mcp,hexstrike,hexstrike-mcp,ollama-mcp,ollama,agent-ingestion,agent-processing,agent-synthesis,localhost,127.0.0.1"
    dns:
      - 8.8.8.8
      - 1.1.1.1
    volumes:
      - results:/tmp/screenshots:ro
    depends_on:
      kali-mcp:
        condition: service_healthy
      metasploit-mcp:
        condition: service_healthy
      wire-mcp:
        condition: service_healthy
      screenshot-mcp:
        condition: service_healthy
      hexstrike:
        condition: service_healthy
      hexstrike-mcp:
        condition: service_healthy
      ollama-mcp:
        condition: service_healthy
    networks:
      - blhackbox_net

  # -- PORTAINER CE ----------------------------------------------------------
  # Web UI for container management -- https://localhost:9443
  # Source: https://github.com/portainer/portainer
  #
  # FIRST RUN: Open https://localhost:9443 and create an admin account
  # within 5 minutes of startup. If you miss the window, restart Portainer:
  #   docker compose restart portainer
  #
  # WARNING: mounts Docker socket -- grants effective root on host.
  # Never expose port 9443 to the public internet.
  portainer:
    image: portainer/portainer-ce:latest
    container_name: blhackbox-portainer
    restart: always
    ports:
      - "9443:9443"
      # Port 8000: Portainer Edge Agent tunnel server (optional).
      # Only needed if you plan to manage remote Docker hosts via Edge Agents.
      # - "8000:8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    networks:
      - blhackbox_net
